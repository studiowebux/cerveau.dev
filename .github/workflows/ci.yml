name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: go vet
        run: go vet ./cmd/cerveau/

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          install-go: false

      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./cmd/cerveau/

      - name: tests
        run: go test -v -race -count=1 ./cmd/cerveau/

      - name: build
        run: go build -o /dev/null ./cmd/cerveau/
