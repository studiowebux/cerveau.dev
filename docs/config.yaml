title: Brain Protocol
description: Multi-brain system for Claude Code. One protocol, many projects, zero duplication.
base_url: https://cerveau.dev
author: Studio Webux
theme: default
dark_mode: false
enable_llms: true
enable_search: true
clean_urls: false

changelog:
  enabled: true
  title: "Changelog"
  path: "changelog"
  rss_enabled: true
  repository: "https://github.com/studiowebux/cerveau.dev"

stale_warning:
  enabled: true
  threshold_days: 365
  show_update_date: true

landing:
  enabled: true
  nav:
    - text: "Docs"
      url: "/01-getting-started/01-installation.html"
    - text: "GitHub"
      url: "https://github.com/studiowebux/cerveau.dev"
    - text: "Discord"
      url: "https://discord.gg/BG5Erm9fNv"
  hero:
    title: "Brain Protocol"
    subtitle: "Multi-brain system for Claude Code. One protocol, many projects, zero duplication. MDPlanner keeps every session on track."
    buttons:
      - text: "Get Started"
        url: "/01-getting-started/01-installation.html"
        primary: true
      - text: "View on GitHub"
        url: "https://github.com/studiowebux/cerveau.dev"
        primary: false

  features:
    title: "Why Brain Protocol?"
    items:
      - emoji: "~"
        title: "Multi-Brain"
        description: "One protocol, many projects. Each brain gets selective rules, hooks, and agents — no duplication, no drift."
      - emoji: "@"
        title: "Selective Loading"
        description: "Only load what each brain needs. Declare stacks, practices, and workflows per project. Every saved token is faster context."
      - emoji: "#"
        title: "MDPlanner Integration"
        description: "Single source of truth for tasks, notes, decisions, and progress. Claude reads and writes it every session."
      - emoji: "$"
        title: "Hooks Enforcement"
        description: "Boot reminders, commit validation, checkpoint checks, and progress gates. The protocol runs whether Claude remembers or not."
      - emoji: "%"
        title: "Protocol-Driven Workflow"
        description: "Four phases, sixteen hard rules. Boot → Work → Write Back → Close. Zero drift between sessions."
      - emoji: "&"
        title: "Zero Footprint"
        description: "No files added to your project repos. The brain lives outside your code. Your codebase stays clean."
      - emoji: "+"
        title: "Bring Your Own Rules"
        description: "No rules ship by default. Generate stack, practice, and workflow rules with a single Claude prompt."
      - emoji: "*"
        title: "Open Source"
        description: "AGPL-3.0. Self-host everything. MDPlanner runs in Docker. No external dependencies required."

  links:
    title: "Resources"
    items:
      - icon: "github"
        title: "GitHub"
        description: "Source code and issues"
        url: "https://github.com/studiowebux/cerveau.dev"
      - icon: "discord"
        title: "Discord"
        description: "Join the community"
        url: "https://discord.gg/BG5Erm9fNv"

  opensource:
