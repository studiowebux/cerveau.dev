title: Cerveau.dev
description: Multi-brain system for Claude Code. One protocol, many projects, zero duplication.
base_url: https://cerveau.dev
author: Studio Webux
theme: default
theme_config:
  fonts:
    google_url: "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap"
    heading: "'Playfair Display', serif"
dark_mode: false
enable_llms: true
enable_search: true
clean_urls: false

changelog:
  enabled: true
  title: "Changelog"
  path: "changelog"
  rss_enabled: true
  repository: "https://github.com/studiowebux/cerveau.dev"

stale_warning:
  enabled: true
  threshold_days: 365
  show_update_date: true

landing:
  enabled: true
  nav:
    - text: "Docs"
      url: "/getting-started/installation.html"
    - text: "Ecosystem"
      url: "/ecosystem.html"
    - text: "GitHub"
      url: "https://github.com/studiowebux/cerveau.dev"
    - text: "Discord"
      url: "https://discord.gg/BG5Erm9fNv"
  hero:
    title: "Cerveau.dev"
    subtitle: "Multi-brain system for Claude Code. One protocol, many projects, zero duplication. MDPlanner keeps every session on track."
    buttons:
      - text: "Get Started"
        url: "/getting-started/installation.html"
        primary: true
      - text: "View on GitHub"
        url: "https://github.com/studiowebux/cerveau.dev"
        primary: false

  steps:
    title: "Quick Start"
    items:
      - title: "Install"
        description: "One command installs the protocol, starts MDPlanner, and registers MCP globally."
        code: "curl -fsSL https://cerveau.dev/install.sh | bash"
      - title: "Create a Brain"
        description: "Spawn a brain for your project. Zero files added to your codebase. For an existing project, clone the repo first, then point spawn at it."
        code: "cerveau spawn MyApp /tmp/MyApp"
      - title: "Launch"
        description: "Open the brain session. Claude boots with full context automatically."
        code: "cd ~/.cerveau/_brains_/myapp-brain && claude"
      - title: "Boot"
        description: "Type 'boot' inside the session. Claude reads the rules, fills local-dev.md, and configures MDPlanner state."
        code: "boot"

  features:
    title: "Why Cerveau.dev?"
    items:
      - emoji: "~"
        title: "Multi-Brain"
        description: "One protocol, many projects. Each brain gets selective rules, hooks, and agents — no duplication, no drift."
      - emoji: "@"
        title: "Selective Loading"
        description: "Only load what each brain needs. Declare stacks, practices, and workflows per project. Every saved token is faster context."
      - emoji: "#"
        title: "MDPlanner Integration"
        description: "Single source of truth for tasks, notes, decisions, and progress. Claude reads and writes it every session."
      - emoji: "$"
        title: "Hooks Enforcement"
        description: "Boot reminders, commit validation, checkpoint checks, and progress gates. The protocol runs whether Claude remembers or not."
      - emoji: "%"
        title: "Protocol-Driven Workflow"
        description: "Claude picks up exactly where it left off. Every session starts with full context — tasks, decisions, and progress loaded from MDPlanner."
      - emoji: "&"
        title: "Zero Footprint"
        description: "No files added to your project repos. The brain lives outside your code. Your codebase stays clean."
      - emoji: "+"
        title: "Bring Your Own Rules"
        description: "No rules ship by default. Generate stack, practice, and workflow rules with a single Claude prompt."
      - emoji: "*"
        title: "Open Source"
        description: "AGPL-3.0. Self-host everything. MDPlanner runs in a container. No external dependencies required."

  links:
    title: "Resources"
    items:
      - icon: "github"
        title: "GitHub"
        description: "Source code and issues"
        url: "https://github.com/studiowebux/cerveau.dev"
      - icon: "github"
        title: "MDPlanner"
        description: "Task and note backend"
        url: "https://github.com/studiowebux/mdplanner"
      - icon: "github"
        title: "MDPlanner Container"
        description: "Container images (ghcr.io)"
        url: "https://github.com/studiowebux/mdplanner/pkgs/container/mdplanner"
      - icon: "discord"
        title: "Discord"
        description: "Join the community"
        url: "https://discord.gg/BG5Erm9fNv"

  opensource:
    title: "Open Source"
    description: "AGPL-3.0 Licensed. Self-host everything. No telemetry, no accounts, no subscriptions. Built by Studio Webux."
    links: []

