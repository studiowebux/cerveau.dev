<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerveau.dev — Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<script>(function(){const t=localStorage.getItem('ecosystem-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  /* ── Font-size scale (rem, min 0.75rem = 12px) ── */
  :root {
    --fs-xs:   0.75rem;    /* 12px — labels, tags, captions */
    --fs-sm:   0.8125rem;  /* 13px — brand name, meta values */
    --fs-base: 0.875rem;   /* 14px — node title, dp value */
    --fs-lg:   0.9375rem;  /* 15px — stat numbers */
    --fs-xl:   1rem;       /* 16px — canvas brand h1, bar brand */
    --fs-2xl:  1.125rem;   /* 18px — detail panel name */
  }

  :root[data-theme="dark"] {
    --bg: #080808;
    --surface: #0d0d0d;
    --border: #303030;
    --border-hi: #4a4a4a;
    --text: #ededed;
    --muted: #b8b8b8;
    --dim: #e0e0e0;
    --node-bg: #232323;
    --node-border: #3c3c3c;
    --node-hover: #2c2c2c;
    --line: rgba(255,255,255,0.06);
    --line-active: rgba(255,255,255,0.45);
    --tag-bg: #2a2a2a;
    --bar-bg: #0a0a0a;
    --detail-bg: #141414;
  }
  :root[data-theme="light"] {
    --bg: #f4f4f2;
    --surface: #fafaf8;
    --border: #deded8;
    --border-hi: #b8b8b2;
    --text: #0a0a0a;
    --muted: #484848;
    --dim: #606060;
    --node-bg: #fff;
    --node-border: #deded8;
    --node-hover: #f8f8f6;
    --line: rgba(0,0,0,0.07);
    --line-active: rgba(0,0,0,0.35);
    --tag-bg: #eeeeed;
    --bar-bg: #e8e8e6;
    --detail-bg: #e8e8e6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--surface); color: var(--text); font-family: 'DM Mono', monospace; font-size: var(--fs-xs); transition: background 0.4s, color 0.4s; }

  /* ── Full-screen canvas ── */
  #canvas {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: 48px;
    background: var(--surface);
    overflow: hidden;
    cursor: grab;
  }
  #canvas::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── Watermark ── */
  .canvas-brand {
    position: absolute; top: 20px; left: 24px; z-index: 5;
    pointer-events: none;
  }
  .canvas-brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: var(--fs-xl); font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
  }
  .canvas-brand p {
    font-size: var(--fs-xs); letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-top: 3px;
  }

  /* ── SVG connections ── */
  svg.connections {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 1; overflow: visible;
  }
  svg.connections line {
    stroke: var(--line-active);
    stroke-width: 1;
    stroke-dasharray: 4 6;
    opacity: 0;
    transition: opacity 0.3s, stroke 0.4s;
  }
  svg.connections line.visible { opacity: 1; }

  /* ── Zoomable viewport ── */
  #viewport {
    position: absolute; inset: 0;
    transform-origin: center center;
    will-change: transform;
  }

  /* ── Zoom controls overlay ── */
  .zoom-controls {
    position: absolute; top: 20px; right: 20px; z-index: 20;
    display: flex; flex-direction: column; gap: 4px;
    pointer-events: all;
  }
  .zoom-btn {
    width: 28px; height: 28px;
    background: var(--node-bg); border: 1px solid var(--border-hi);
    border-radius: 3px; color: var(--dim); cursor: pointer;
    font-size: var(--fs-lg); line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.18s, color 0.18s;
  }
  .zoom-btn:hover { border-color: var(--text); color: var(--text); }
  .zoom-level {
    font-size: var(--fs-xs); color: var(--muted); text-align: center;
    letter-spacing: 0.5px; padding: 2px 0;
  }

  /* ── Nodes container ── */
  .nodes { position: relative; z-index: 2; width: 100%; height: 100%; }

  /* ── Node cards ── */
  .node {
    position: absolute;
    background: var(--node-bg);
    border: 1px solid var(--node-border);
    border-radius: 4px;
    padding: 12px 14px;
    cursor: grab;
    width: 150px;
    transform: translateX(-50%) translateY(-50%);
    user-select: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.5s ease forwards;
    opacity: 0;
  }
  .node.dragging {
    cursor: grabbing; z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    transition: none;
  }
  .node:hover, .node.active {
    border-color: var(--dim);
    background: var(--node-hover);
    z-index: 10;
    box-shadow: 0 0 0 1px var(--dim);
  }
  .node.center { width: 190px; border-color: var(--border-hi); }
  .node.center:hover, .node.center.active {
    border-color: var(--text);
    box-shadow: 0 0 0 1px var(--text), 0 0 32px rgba(255,255,255,0.04);
  }
  .node.center::after {
    content: '';
    position: absolute; top: -4px; right: -4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.8; transform: scale(1); }
    50%      { opacity: 0.15; transform: scale(2); }
  }
  .node.dimmed { opacity: 0.15 !important; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-46%); }
    to   { opacity: 1; transform: translateX(-50%) translateY(-50%); }
  }

  .node-category { font-size: var(--fs-xs); letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .node-title    { font-family: 'Playfair Display', serif; font-size: var(--fs-base); color: var(--text); line-height: 1.2; }
  .node-desc     { font-size: var(--fs-xs); color: var(--muted); margin-top: 5px; line-height: 1.5; }
  .node-tag      { display: inline-block; margin-top: 8px; font-size: var(--fs-xs); letter-spacing: 1px; text-transform: uppercase; background: var(--tag-bg); border: 1px solid var(--border-hi); padding: 2px 6px; border-radius: 2px; color: var(--dim); }

  /* ── Detail panel (inside canvas, slides from bottom) ── */
  #detail-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--detail-bg);
    border-top: 1px solid var(--border-hi);
    z-index: 30;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  #detail-panel.open { transform: translateY(0); }
  .dp-body {
    display: flex; align-items: center; gap: 36px;
    padding: 14px 24px 16px;
  }
  .dp-name  { font-family: 'Playfair Display', serif; font-size: var(--fs-2xl); min-width: 170px; }
  .dp-meta  { display: flex; gap: 24px; flex: 1; flex-wrap: wrap; }
  .dp-field { display: flex; flex-direction: column; gap: 3px; }
  .dp-label { font-size: var(--fs-xs); letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .dp-value { font-size: var(--fs-base); color: var(--text); }
  .dp-visit {
    font-size: var(--fs-xs); letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text); text-decoration: none;
    padding: 5px 11px; border: 1px solid var(--border-hi); border-radius: 2px;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .dp-visit:hover { border-color: var(--text); }
  .dp-visit.hidden { display: none; }
  .dp-close {
    font-size: var(--fs-xs); letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
    padding: 5px 11px; border: 1px solid var(--border); border-radius: 2px;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .dp-close:hover { border-color: var(--border-hi); color: var(--text); }

  /* ── Bottom bar ── */
  #bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 48px;
    background: var(--bar-bg);
    border-top: 1px solid var(--border-hi);
    display: flex; align-items: stretch;
    z-index: 50;
    font-size: var(--fs-xs); letter-spacing: 1.5px; text-transform: uppercase;
  }

  .bar-section {
    display: flex; align-items: center;
    padding: 0 20px;
    border-right: 1px solid var(--border);
    gap: 8px;
  }
  .bar-section:last-child { border-right: none; }
  .bar-section.grow { flex: 1; }

  .bar-brand-name { font-family: 'Playfair Display', serif; font-size: var(--fs-sm); letter-spacing: -0.3px; color: var(--text); }
  .bar-brand-sep  { color: var(--muted); }
  .bar-brand-sub  { color: var(--muted); }

  .bar-stat { display: flex; align-items: baseline; gap: 5px; padding: 0 10px; }
  .bar-stat + .bar-stat { border-left: 1px solid var(--border); }
  .bar-stat-num   { font-family: 'Playfair Display', serif; font-size: var(--fs-lg); color: var(--text); }
  .bar-stat-label { color: var(--muted); }

  .legend-item {
    display: flex; align-items: center; gap: 5px;
    color: var(--muted); cursor: pointer;
    padding: 4px 9px; border: 1px solid transparent; border-radius: 3px;
    transition: all 0.18s;
  }
  .legend-item:hover  { border-color: var(--border); color: var(--dim); }
  .legend-item.active { border-color: var(--border-hi); color: var(--text); }
  .legend-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text); opacity: 0.35; }
  .legend-item.active .legend-dot { opacity: 1; }

  .bar-webux {
    font-family: 'Playfair Display', serif; font-size: var(--fs-xs); letter-spacing: -0.3px;
    color: var(--text); text-decoration: none; transition: opacity 0.2s;
  }
  .bar-webux:hover { opacity: 0.7; }

  .theme-toggle {
    cursor: pointer; background: transparent;
    border: 1px solid var(--border-hi); border-radius: 100px;
    padding: 4px 12px; font-family: 'DM Mono', monospace;
    font-size: var(--fs-xs); letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--dim); transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .theme-toggle:hover { border-color: var(--text); color: var(--text); }
  .theme-toggle .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text); }
</style>
</head>
<body>

<div id="canvas">
  <a class="canvas-brand" href="/" style="text-decoration:none;pointer-events:all;">
    <h1>Cerveau.dev</h1>
    <p>Ecosystem · 2026</p>
  </a>
  <div id="viewport">
    <svg class="connections" id="svg-lines"></svg>
    <div class="nodes" id="nodes-container"></div>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="adjustZoom(0.1)" title="Zoom in">+</button>
    <div class="zoom-level" id="zoom-label">85%</div>
    <button class="zoom-btn" onclick="adjustZoom(-0.1)" title="Zoom out">−</button>
    <button class="zoom-btn" onclick="resetZoom()" title="Reset zoom" style="font-size:var(--fs-xs);letter-spacing:0;">↺</button>
  </div>
  <div id="detail-panel">
    <div class="dp-body">
      <div class="dp-name" id="dp-name">—</div>
      <div class="dp-meta">
        <div class="dp-field"><span class="dp-label">Category</span><span class="dp-value" id="dp-cat">—</span></div>
        <div class="dp-field"><span class="dp-label">Type</span><span class="dp-value" id="dp-type">—</span></div>
        <div class="dp-field"><span class="dp-label">Status</span><span class="dp-value" id="dp-status">—</span></div>
        <div class="dp-field"><span class="dp-label">Connects to</span><span class="dp-value" id="dp-connects">—</span></div>
      </div>
      <a class="dp-visit" id="dp-visit" href="#" target="_blank" rel="noopener">Visit →</a>
      <div class="dp-close" onclick="closePanel()">✕ Close</div>
    </div>
  </div>
</div>

<div id="bottom-bar">
  <div class="bar-section">
    <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:8px;">
      <span class="bar-brand-name">Cerveau.dev</span>
    </a>
    <span class="bar-brand-sep">·</span>
    <span class="bar-brand-sub">Ecosystem</span>
  </div>
  <div class="bar-section">
    <span id="stat-breakdown" class="bar-stat-label">—</span>
  </div>
  <div class="bar-section grow">
    <div class="legend-item active" onclick="filterCategory(event,'all')"><div class="legend-dot"></div>All</div>
    <div class="legend-item" onclick="filterCategory(event,'core')"><div class="legend-dot"></div>Core</div>
    <div class="legend-item" onclick="filterCategory(event,'ai')"><div class="legend-dot"></div>AI</div>
    <div class="legend-item" onclick="filterCategory(event,'data')"><div class="legend-dot"></div>Data</div>
    <div class="legend-item" onclick="filterCategory(event,'integration')"><div class="legend-dot"></div>Integration</div>
    <div class="legend-item" onclick="filterCategory(event,'apps')"><div class="legend-dot"></div>Apps</div>
  </div>
  <div class="bar-section">
    <span class="bar-brand-sub" style="font-size:0.625rem;">Powered by</span>
    <a class="bar-webux" href="https://studiowebux.com" target="_blank" rel="noopener">studio webux</a>
  </div>
  <div class="bar-section">
    <button class="theme-toggle" onclick="toggleTheme()">
      <span class="dot"></span>
      <span id="theme-label">Light</span>
    </button>
  </div>
</div>

<script>
const nodes = [
  {
    id: 'brain', title: 'Cerveau.dev', category: 'core',
    desc: '4-phase session protocol. Boot → Work → Write Back → Close.',
    type: 'cerveau.dev (OSS)', status: 'Production', tag: 'Protocol',
    url: 'https://github.com/studiowebux/cerveau.dev',
    x: 50, y: 12,
    connects: ['mdplanner', 'claude', 'github']
  },
  {
    id: 'mdplanner', title: 'MDPlanner', category: 'core',
    desc: 'Tasks, notes, decisions, milestones. Single source of truth for human and AI.',
    type: 'Self-hosted / Deno', status: 'Production', tag: 'Memory Hub',
    url: 'https://mdplanner.dev',
    center: true, x: 52, y: 48,
    connects: ['brain', 'mcp', 'markdown']
  },
  {
    id: 'mcp', title: 'MCP Server', category: 'ai',
    desc: 'Streamable HTTP + SSE interface. Bridges AI agents to MDPlanner.',
    type: 'Model Context Protocol', status: 'Production', tag: 'AI Bridge',
    url: 'https://modelcontextprotocol.io/docs/getting-started/intro',

    connects: ['mdplanner', 'claude', 'ezra']
  },
  {

    desc: 'Boots from MDPlanner. Picks tasks, commits code, writes progress notes.',
    type: 'Anthropic', status: 'Active', tag: 'AI Agent',
    url: 'https://claude.ai',
    x: 70, y: 40,
    connects: ['brain', 'mcp']
  },
  {
    id: 'ezra', title: 'Ezra', category: 'ai',
    desc: 'Go AI agent powered by local LLMs via Ollama. Autonomous task loop over MCP.',
    type: 'Self-hosted / Go', status: 'Active', tag: 'AI Agent',
    x: 87, y: 78,
    connects: ['mcp']
  },
  {
    id: 'aichat', title: 'AI Chat', category: 'ai',
    desc: 'Self-hosted AI chat. Ollama + SearXNG search + Chatterbox TTS.',
    type: 'Self-hosted / Offline', status: 'Active', tag: 'Local AI',
    x: 58, y: 85,
    connects: ['mdplanner']
  },
  {
    id: 'github', title: 'GitHub', category: 'integration',
    desc: 'Source code host. PRs and commits pushed by Claude per task.',
    type: 'Version Control', status: 'Active', tag: 'Code',
    url: 'https://github.com',
    x: 30, y: 20,
    connects: ['brain']
  },
  {
    id: 'obsidian', title: 'Obsidian', category: 'integration',
    desc: 'Knowledge view. Reads and edits MDPlanner data as a vault via WebDAV.',
    type: 'Client', status: 'Active', tag: 'Knowledge',
    url: 'https://obsidian.md',
    x: 5, y: 62,
    connects: ['webdav', 'markdown']
  },
  {
    id: 'cloudflare', title: 'Cloudflare', category: 'integration',
    desc: 'Read-only DNS integration. MDPlanner displays and monitors DNS records.',
    type: 'Cloud / API', status: 'Active', tag: 'DNS',
    url: 'https://cloudflare.com',
    x: 10, y: 22,
    connects: ['mdplanner']
  },
  {
    id: 'markdown', title: 'Markdown Files', category: 'data',
    desc: 'All data on disk as .md files. Tasks, notes, decisions. You own everything.',
    type: 'File System', status: 'Always on', tag: 'Storage',
    x: 38, y: 85,
    connects: ['mdplanner', 'webdav']
  },
  {
    id: 'webdav', title: 'WebDAV', category: 'data',
    desc: 'Exposes markdown files as a remote vault. Obsidian mounts and syncs.',
    type: 'Protocol', status: 'Production', tag: 'Sync',
    x: 7, y: 83,
    connects: ['mdplanner', 'markdown', 'obsidian']
  },
  {
    id: 'minimaldoc', title: 'MinimalDoc', category: 'apps',
    desc: 'Go static site generator for docs. Markdown in, clean HTML out. Powers this site.',
    type: 'Self-hosted / Go', status: 'Production', tag: 'Docs',
    url: 'https://github.com/studiowebux/minimaldoc',
    x: 22, y: 50,
    connects: ['brain', 'github', 'markdown']
  },
  {
    id: 'zurm', title: 'Zurm', category: 'apps',
    desc: 'Terminal multiplexer built with Ebitengine. Used daily for all dev work.',
    type: 'Desktop / Go', status: 'Active', tag: 'Terminal',
    url: 'https://zurm.dev',
    x: 74, y: 11,
    connects: ['brain']
  },
  {
    id: 'dockward', title: 'Dockward', category: 'apps',
    desc: 'Docker management API and dashboard. Containers, logs, control from one place.',
    type: 'Self-hosted / Go', status: 'Beta', tag: 'DevOps',
    url: 'https://dockward.com',
    x: 90, y: 30,
    connects: ['brain']
  },
];

let activeNode = null;
let activeFilter = 'all';
let drag = null;
let zoom = 0.85;
let panX = 0, panY = 0;
let panning = null;
const ZOOM_MIN = 0.3;
const ZOOM_MAX = 2.0;
const ZOOM_STEP = 0.1;

function applyZoom() {
  document.getElementById('viewport').style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
}
function adjustZoom(delta) {
  zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round((zoom + delta) * 10) / 10));
  applyZoom();
}
function resetZoom() {
  zoom = 0.85; panX = 0; panY = 0;
  applyZoom();
}

function beginDrag(e, node) {
  e.preventDefault();
  drag = {
    node,
    startMouseX: e.clientX, startMouseY: e.clientY,
    startNodeX: node.x,     startNodeY: node.y,
    moved: false
  };
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup',   onDragEnd);
}

function onDragMove(e) {
  if (!drag) return;
  const canvas = document.getElementById('canvas');
  const cw = canvas.offsetWidth;
  const ch = canvas.offsetHeight;
  const dx = e.clientX - drag.startMouseX;
  const dy = e.clientY - drag.startMouseY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
  drag.node.x = Math.max(5, Math.min(95, drag.startNodeX + (dx / cw) * 100));
  drag.node.y = Math.max(4, Math.min(96, drag.startNodeY + (dy / ch) * 100));
  const el = document.getElementById('node-' + drag.node.id);
  el.classList.add('dragging');
  el.style.left = drag.node.x + '%';
  el.style.top  = drag.node.y + '%';
  renderLines();
}

function onDragEnd() {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
  if (!drag) return;
  document.getElementById('node-' + drag.node.id).classList.remove('dragging');
  if (!drag.moved) selectNode(drag.node);
  drag = null;
}

function getPos(node) {
  const canvas = document.getElementById('canvas');
  return {
    x: (node.x / 100) * canvas.offsetWidth,
    y: (node.y / 100) * canvas.offsetHeight
  };
}

function renderNodes() {
  const container = document.getElementById('nodes-container');
  container.innerHTML = '';
  nodes.forEach((node, i) => {
    const el = document.createElement('div');
    el.className = 'node' + (node.center ? ' center' : '');
    el.id = 'node-' + node.id;
    el.style.left = node.x + '%';
    el.style.top  = node.y + '%';
    el.style.animationDelay = (i * 0.07) + 's';
    if (activeFilter !== 'all' && node.category !== activeFilter && !node.center) {
      el.style.opacity = '0.12';
    }
    el.innerHTML = `
      <div class="node-category">${node.category}</div>
      <div class="node-title">${node.title}</div>
      <div class="node-desc">${node.desc}</div>
      <div class="node-tag">${node.tag}</div>
    `;
    el.addEventListener('mousedown', e => beginDrag(e, node));
    container.appendChild(el);
  });
}

function renderLines() {
  const svg = document.getElementById('svg-lines');
  svg.innerHTML = '';
  const drawn = new Set();
  nodes.forEach(node => {
    node.connects.forEach(targetId => {
      const key = [node.id, targetId].sort().join('-');
      if (drawn.has(key)) return;
      drawn.add(key);
      const target = nodes.find(n => n.id === targetId);
      if (!target) return;
      const from = getPos(node), to = getPos(target);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', from.x); line.setAttribute('y1', from.y);
      line.setAttribute('x2', to.x);   line.setAttribute('y2', to.y);
      line.setAttribute('data-a', node.id);
      line.setAttribute('data-b', targetId);
      svg.appendChild(line);
    });
  });
  setTimeout(() => {
    svg.querySelectorAll('line').forEach(l => l.classList.add('visible'));
  }, 300);
}

function selectNode(node) {
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('svg.connections line').forEach(l => l.style.opacity = '0.04');
  if (activeNode === node.id) {
    activeNode = null;
    document.querySelectorAll('svg.connections line').forEach(l => l.style.opacity = '');
    closePanel(); return;
  }
  activeNode = node.id;
  document.getElementById('node-' + node.id).classList.add('active');
  document.querySelectorAll('svg.connections line').forEach(l => {
    const a = l.getAttribute('data-a'), b = l.getAttribute('data-b');
    if (a === node.id || b === node.id) l.style.opacity = '1';
  });
  document.getElementById('dp-name').textContent     = node.title;
  document.getElementById('dp-cat').textContent      = node.category;
  document.getElementById('dp-type').textContent     = node.type;
  document.getElementById('dp-status').textContent   = node.status;
  document.getElementById('dp-connects').textContent = node.connects.length ? node.connects.join(', ') : '—';
  const visit = document.getElementById('dp-visit');
  if (node.url) { visit.href = node.url; visit.classList.remove('hidden'); }
  else          { visit.classList.add('hidden'); }
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  activeNode = null;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('svg.connections line').forEach(l => l.style.opacity = '');
  document.getElementById('detail-panel').classList.remove('open');
}

function filterCategory(e, cat) {
  activeFilter = cat;
  activeNode = null;
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  e.target.closest('.legend-item').classList.add('active');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.getElementById('detail-panel').classList.remove('open');
  const dimmed = new Set();
  nodes.forEach(node => {
    const el = document.getElementById('node-' + node.id);
    if (!el) return;
    const hide = cat !== 'all' && node.category !== cat && !node.center;
    el.classList.toggle('dimmed', hide);
    if (hide) dimmed.add(node.id);
  });
  document.querySelectorAll('svg.connections line').forEach(l => {
    const a = l.getAttribute('data-a'), b = l.getAttribute('data-b');
    l.style.opacity = (dimmed.has(a) || dimmed.has(b)) ? '0.04' : '';
  });
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('ecosystem-theme', next);
  document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
  setTimeout(renderLines, 50);
}

function computeStats() {
  const counts = {};
  nodes.forEach(n => { counts[n.category] = (counts[n.category] || 0) + 1; });
  const order = ['core', 'ai', 'integration', 'data', 'apps'];
  const parts = order.filter(c => counts[c]).map(c => `${counts[c]} ${c[0].toUpperCase() + c.slice(1)}`);
  document.getElementById('stat-breakdown').textContent = parts.join(' · ');
}

window.addEventListener('load', () => {
  renderNodes(); renderLines(); computeStats(); applyZoom();
  const saved = localStorage.getItem('ecosystem-theme');
  const isDark = (saved || 'dark') === 'dark';
  document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
  const canvas = document.getElementById('canvas');
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    adjustZoom(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP);
  }, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node,.zoom-controls,.canvas-brand,#detail-panel')) return;
    panning = { startX: e.clientX - panX, startY: e.clientY - panY };
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!panning) return;
    panX = e.clientX - panning.startX;
    panY = e.clientY - panning.startY;
    applyZoom();
  });
  document.addEventListener('mouseup', () => {
    if (!panning) return;
    panning = null;
    canvas.style.cursor = '';
  });
});
window.addEventListener('resize', () => renderLines());
</script>
</body>
</html>
